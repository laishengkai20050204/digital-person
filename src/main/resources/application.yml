spring:
  application:
    name: digital-person
  mvc:
    async:
      request-timeout: ${SPRING_MVC_ASYNC_REQUEST_TIMEOUT:210s}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

digital-person:
  persistence:
    mysql:
      enabled: ${MYSQL_PERSISTENCE_ENABLED:false}
      jdbc-url: ${MYSQL_JDBC_URL:}
      username: ${MYSQL_USERNAME:}
      password: ${MYSQL_PASSWORD:}
      maximum-pool-size: ${MYSQL_MAXIMUM_POOL_SIZE:10}
      connection-timeout: ${MYSQL_CONNECTION_TIMEOUT:30s}
  person-api:
    enabled: ${PERSON_API_ENABLED:false}
    token: ${PERSON_API_TOKEN:}
  activity-scheduler:
    enabled: ${ACTIVITY_SCHEDULER_ENABLED:false}
    poll-interval: ${ACTIVITY_SCHEDULER_POLL_INTERVAL:10s}
    initial-delay: ${ACTIVITY_SCHEDULER_INITIAL_DELAY:30s}
    reconciliation-interval: ${ACTIVITY_SCHEDULER_RECONCILIATION_INTERVAL:1h}
    reconciliation-initial-delay: ${ACTIVITY_SCHEDULER_RECONCILIATION_INITIAL_DELAY:5s}
    initial-review-delay: ${ACTIVITY_SCHEDULER_INITIAL_REVIEW_DELAY:1m}
    minimum-review-delay: ${ACTIVITY_SCHEDULER_MINIMUM_REVIEW_DELAY:1m}
    conflict-retry-delay: ${ACTIVITY_SCHEDULER_CONFLICT_RETRY_DELAY:30s}
    lease-duration: ${ACTIVITY_SCHEDULER_LEASE_DURATION:10m}
    lease-renewal-interval: ${ACTIVITY_SCHEDULER_LEASE_RENEWAL_INTERVAL:2m}
    decision-timeout: ${ACTIVITY_SCHEDULER_DECISION_TIMEOUT:8m}
    failure-backoff: ${ACTIVITY_SCHEDULER_FAILURE_BACKOFF:5m}
    max-failure-backoff: ${ACTIVITY_SCHEDULER_MAX_FAILURE_BACKOFF:1h}
    batch-size: ${ACTIVITY_SCHEDULER_BATCH_SIZE:10}
    max-in-flight: ${ACTIVITY_SCHEDULER_MAX_IN_FLIGHT:4}
  memory:
    mem0:
      enabled: ${MEM0_ENABLED:false}
      required: ${MEM0_REQUIRED:false}
      retrieval-enabled: ${MEM0_RETRIEVAL_ENABLED:false}
      minimum-relevance: ${MEM0_MINIMUM_RELEVANCE:0.30}
      extraction-instructions: "${MEM0_EXTRACTION_INSTRUCTIONS:将提取出的长期记忆始终写成简体中文。只保存对未来交互有持续价值的明确事实、偏好、关系、目标、计划、承诺、习惯和重要经历；使用第三人称，表达简洁，一条记忆只包含一个主要事实；不要使用 Agent learned that 等英文模板，不要翻译人名、产品名等专有名词。}"
      base-url: ${MEM0_BASE_URL:http://127.0.0.1:8888}
      api-key: ${MEM0_API_KEY:}
      connect-timeout: ${MEM0_CONNECT_TIMEOUT:2s}
      request-timeout: ${MEM0_REQUEST_TIMEOUT:30s}
      health-path: ${MEM0_HEALTH_PATH:/auth/setup-status}
    test-api:
      enabled: ${MEMORY_TEST_API_ENABLED:false}
      token: ${MEMORY_TEST_API_TOKEN:}
  diagnostics:
    enabled: ${DIAGNOSTICS_ENABLED:false}
    token: ${DIAGNOSTICS_TOKEN:}
  llm:
    enabled: ${LLM_ENABLED:false}
    base-url: ${LLM_BASE_URL:https://openrouter.ai/api/v1}
    api-key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:}
    timeout: ${LLM_TIMEOUT:60s}
    max-retries: ${LLM_MAX_RETRIES:2}
    concurrency:
      maximum: ${LLM_CONCURRENCY_MAXIMUM:4}
      acquire-timeout: ${LLM_CONCURRENCY_ACQUIRE_TIMEOUT:2s}
    connection-test:
      enabled: ${LLM_CONNECTION_TEST_ENABLED:false}
      token: ${LLM_CONNECTION_TEST_TOKEN:}

name: Apply agent repair patch

on:
  push:
    branches:
      - agent/fix-state-agent-reliability
    paths:
      - ".agent-fix/**"
      - ".github/workflows/apply-agent-repair.yml"
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - name: Reconstruct and verify patch
        shell: bash
        run: |
          set -Eeuo pipefail
          cat .agent-fix/patch.part* | base64 --decode --ignore-garbage > /tmp/fixes.patch.gz
          sha256sum /tmp/fixes.patch.gz
          gzip --test /tmp/fixes.patch.gz
          gzip --decompress --stdout /tmp/fixes.patch.gz > /tmp/fixes.patch
          sha256sum /tmp/fixes.patch
          git apply --check /tmp/fixes.patch

      - name: Apply and commit repairs
        shell: bash
        env:
          TARGET_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          set -Eeuo pipefail
          git apply /tmp/fixes.patch
          rm -rf .agent-fix
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'Fix state evolution and agent reliability'
          git push origin HEAD:"$TARGET_BRANCH"

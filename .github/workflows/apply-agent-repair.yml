name: Apply agent repair patch

on:
  push:
    branches:
      - agent/fix-state-agent-reliability
    paths:
      - ".agent-fix/**"
      - ".github/workflows/apply-agent-repair.yml"
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - name: Reconstruct, diagnose, and apply patch
        shell: bash
        env:
          TARGET_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          set -uo pipefail
          {
            echo 'part sizes and hashes:'
            wc -c .agent-fix/patch.part*
            sha256sum .agent-fix/patch.part*
            echo 'base64 decode:'
          } > /tmp/diagnostic.txt

          cat .agent-fix/patch.part* | base64 --decode --ignore-garbage > /tmp/fixes.patch.gz 2>> /tmp/diagnostic.txt
          decode_status=$?
          echo "decode_status=$decode_status" >> /tmp/diagnostic.txt
          sha256sum /tmp/fixes.patch.gz >> /tmp/diagnostic.txt

          gzip --test /tmp/fixes.patch.gz 2>> /tmp/diagnostic.txt
          gzip_status=$?
          echo "gzip_status=$gzip_status" >> /tmp/diagnostic.txt

          if [ "$decode_status" -eq 0 ] && [ "$gzip_status" -eq 0 ]; then
            gzip --decompress --stdout /tmp/fixes.patch.gz > /tmp/fixes.patch
            sha256sum /tmp/fixes.patch >> /tmp/diagnostic.txt
            git apply --check /tmp/fixes.patch 2>> /tmp/diagnostic.txt
            apply_status=$?
          else
            apply_status=99
          fi
          echo "apply_status=$apply_status" >> /tmp/diagnostic.txt

          if [ "$decode_status" -ne 0 ] || [ "$gzip_status" -ne 0 ] || [ "$apply_status" -ne 0 ]; then
            cp /tmp/diagnostic.txt .agent-fix/diagnostic.txt
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add .agent-fix/diagnostic.txt
            git commit -m 'Record repair patch diagnostics'
            git push origin HEAD:"$TARGET_BRANCH"
            cat /tmp/diagnostic.txt
            exit 1
          fi

          git apply /tmp/fixes.patch
          rm -rf .agent-fix
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'Fix state evolution and agent reliability'
          git push origin HEAD:"$TARGET_BRANCH"

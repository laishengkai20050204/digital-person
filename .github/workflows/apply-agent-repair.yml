name: Apply agent repair patch

on:
  push:
    branches:
      - agent/fix-state-agent-reliability
    paths:
      - ".agent-fix/**"
      - ".github/workflows/apply-agent-repair.yml"
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - name: Reconstruct and verify patch
        shell: bash
        run: |
          set -Eeuo pipefail
          cat \
            .agent-fix/patch.part00.00 \
            .agent-fix/patch.part00.01 \
            .agent-fix/patch.part00.02 \
            .agent-fix/patch.part00.03 \
            .agent-fix/patch.part00.04 \
            .agent-fix/patch.part00.05 \
            .agent-fix/patch.part00.06 \
            .agent-fix/patch.part00.07 \
            .agent-fix/patch.part01 \
            .agent-fix/patch.part02 \
            .agent-fix/patch.part03 \
            .agent-fix/patch.part04 \
            | base64 --decode > /tmp/fixes.patch.gz
          echo '0924de4342897f8634e02430993b0b887a3cd771d955a0e2e9f53b968b14f26c  /tmp/fixes.patch.gz' | sha256sum --check --strict
          gzip --test /tmp/fixes.patch.gz
          gzip --decompress --stdout /tmp/fixes.patch.gz > /tmp/fixes.patch
          echo '322410ffceec168b5a768d0b289fb83f271d901cf66581b0afa83c67a54c19c9  /tmp/fixes.patch' | sha256sum --check --strict
          git apply --check /tmp/fixes.patch

      - name: Apply and commit repairs
        shell: bash
        env:
          TARGET_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          set -Eeuo pipefail
          git apply /tmp/fixes.patch
          rm -rf .agent-fix
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'Fix state evolution and agent reliability'
          git push origin HEAD:"$TARGET_BRANCH"

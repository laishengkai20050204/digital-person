name: Apply legacy API cleanup

on:
  push:
    branches:
      - refactor/remove-legacy-state-api

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out cleanup branch
        uses: actions/checkout@v4
        with:
          ref: refactor/remove-legacy-state-api
          fetch-depth: 0

      - name: Apply cleanup
        run: python .github/scripts/apply_cleanup.py

      - name: Remove one-shot automation
        run: rm -f .github/scripts/apply_cleanup.py .github/workflows/apply-cleanup.yml .github/workflows/export-source.yml

      - name: Commit cleanup
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Remove legacy state evaluation API"
          git push origin HEAD:refactor/remove-legacy-state-api

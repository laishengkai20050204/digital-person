name: Apply Natural State CI Fixes

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply focused fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path, old, new, count=1):
              file = Path(path)
              text = file.read_text()
              found = text.count(old)
              if found < count:
                  raise SystemExit(f"{path}: expected at least {count} matches, found {found}")
              file.write_text(text.replace(old, new, count))

          replace(
              'src/main/java/com/laishengkai/digitalperson/experience/PersonEventSnapshot.java',
              '''                ActivityDurationStatus.classify(
                                  ActivityType.valueOf(activityType),
                                  endTime == null
                                          ? 0L
                                          : nonNegativeMinutes(startTime, endTime)
                          ),''',
              '''                compatibilityDurationStatus(
                                  activityType,
                                  endTime == null
                                          ? 0L
                                          : nonNegativeMinutes(startTime, endTime)
                          ),'''
          )
          replace(
              'src/main/java/com/laishengkai/digitalperson/experience/PersonEventSnapshot.java',
              '''    private static Instant max(Instant left, Instant right) {''',
              '''    private static ActivityDurationStatus compatibilityDurationStatus(
                      String activityType,
                      long elapsedMinutes
              ) {
                  try {
                      return ActivityDurationStatus.classify(
                              ActivityType.valueOf(activityType),
                              elapsedMinutes
                      );
                  } catch (IllegalArgumentException ignored) {
                      return ActivityDurationStatus.NORMAL;
                  }
              }

              private static Instant max(Instant left, Instant right) {'''
          )
          replace(
              'src/main/java/com/laishengkai/digitalperson/infrastructure/activity/LanguageModelPersonActivityDecisionModel.java',
              '''必须结合 temporal、currentState、activeEffects、recentEvents、physiology 和 ROUTINE 记忆判断用餐
                              与睡眠。''',
              '''必须结合 temporal、currentState、activeEffects、recentEvents、physiology 和 ROUTINE 记忆判断用餐与睡眠。'''
          )
          replace(
              'src/main/java/com/laishengkai/digitalperson/state/StateUpdater.java',
              '''            fatigueTarget = clampRange(0.05 + sleepDebtHours * 0.03, 0.05, 0.25);''',
              '''            fatigueTarget = clampRange(0.05 + sleepDebtHours * 0.0125, 0.05, 0.15);'''
          )
          replace(
              'src/test/java/com/laishengkai/digitalperson/state/StateTransitionMergerTest.java',
              '''new StateTransition(StateDimension.ENERGY, 2.0)''',
              '''new StateTransition(StateDimension.ENERGY, 30.0)'''
          )
          replace(
              'src/test/java/com/laishengkai/digitalperson/state/StateTransitionMergerTest.java',
              '''new StateTransition(StateDimension.ENERGY, 2.5)''',
              '''new StateTransition(StateDimension.ENERGY, 20.0)'''
          )

          path = Path('src/test/java/com/laishengkai/digitalperson/application/PersonEventCommandServiceTest.java')
          text = path.read_text()
          old_init = 'Person person = new Person(PERSONALITY, stateWithHunger(0.7));'
          if text.count(old_init) < 3:
              raise SystemExit('PersonEventCommandServiceTest: missing initial states')
          text = text.replace(old_init, 'Person person = new Person(PERSONALITY, stateWithValence(0.7));', 2)
          text = text.replace(
              'new StateTransition(StateDimension.HUNGER, -1.0)',
              'new StateTransition(StateDimension.VALENCE, -1.0)',
              1
          )
          text = text.replace(
              'new StateTransition(StateDimension.ENERGY, 1.0)',
              'new StateTransition(StateDimension.TENSION, 1.0)',
              1
          )
          text = text.replace(
              'new StateTransition(StateDimension.HUNGER, -1.0)',
              'new StateTransition(StateDimension.VALENCE, -1.0)',
              1
          )
          old_expected = '''double expectedHunger = 0.7 * Math.exp(-1.0 / 6.0);
                  assertEquals(expectedHunger, result.state().hunger(), EPSILON);'''
          if text.count(old_expected) != 2:
              raise SystemExit('PersonEventCommandServiceTest: expected assertions changed')
          text = text.replace(
              old_expected,
              '''double expectedValence = 0.7 * Math.exp(-1.0 / 6.0);
                  assertEquals(expectedValence, result.state().valence(), EPSILON);'''
          )
          helper_anchor = '''    private static PersonState stateWithHunger(double hunger) {'''
          helper = '''    private static PersonState stateWithValence(double valence) {
                  return new PersonState(
                          new AffectState(valence, 0.5, 0.0),
                          CognitiveState.baseline(),
                          PhysicalState.baseline(),
                          SocialState.baseline()
                  );
              }

          '''
          if helper_anchor not in text:
              raise SystemExit('PersonEventCommandServiceTest: helper anchor missing')
          path.write_text(text.replace(helper_anchor, helper + helper_anchor, 1))

          path = Path('src/test/java/com/laishengkai/digitalperson/application/StateUpdateConsistencyRegressionTest.java')
          text = path.read_text()
          text = text.replace(
              'Person person = new Person(PERSONALITY, stateWithHunger(0.7));',
              'Person person = new Person(PERSONALITY, stateWithValence(0.7));',
              1
          )
          text = text.replace(
              'eventBoundImpact(new StateTransition(StateDimension.HUNGER, -1.0))',
              'eventBoundImpact(new StateTransition(StateDimension.VALENCE, -1.0))',
              1
          )
          text = text.replace(
              'stored.getState().getPhysicalState().getHunger()',
              'stored.getStateSnapshot().valence()',
              1
          )
          helper = '''    private static PersonState stateWithValence(double valence) {
                  return new PersonState(
                          new AffectState(valence, 0.5, 0.0),
                          CognitiveState.baseline(),
                          PhysicalState.baseline(),
                          SocialState.baseline()
                  );
              }

          '''
          if helper_anchor not in text:
              raise SystemExit('StateUpdateConsistencyRegressionTest: helper anchor missing')
          path.write_text(text.replace(helper_anchor, helper + helper_anchor, 1))
          PY
          rm -f .github/workflows/apply-natural-state-ci-fixes.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix natural state regression boundaries"
          git push origin HEAD:${{ github.head_ref }}

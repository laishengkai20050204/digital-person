name: Apply Natural State CI Fixes

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply focused fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def rewrite(path, transform):
              file = Path(path)
              before = file.read_text()
              after = transform(before)
              if after == before:
                  raise SystemExit(f"{path}: transformation made no change")
              file.write_text(after)
              print(f"updated {path}")

          def replace_once(text, old, new, label):
              if old not in text:
                  raise SystemExit(f"missing {label}")
              return text.replace(old, new, 1)

          def snapshot(text):
              text, count = re.subn(
                  r'ActivityDurationStatus\.classify\(\s*ActivityType\.valueOf\(activityType\),\s*endTime == null\s*\? 0L\s*: nonNegativeMinutes\(startTime, endTime\)\s*\)',
                  '''compatibilityDurationStatus(
                          activityType,
                          endTime == null
                                  ? 0L
                                  : nonNegativeMinutes(startTime, endTime)
                  )''',
                  text,
                  count=1
              )
              if count != 1:
                  raise SystemExit(f"PersonEventSnapshot classification matches={count}")
              anchor = '    private static Instant max(Instant left, Instant right) {'
              helper = '''    private static ActivityDurationStatus compatibilityDurationStatus(
                      String activityType,
                      long elapsedMinutes
              ) {
                  try {
                      return ActivityDurationStatus.classify(
                              ActivityType.valueOf(activityType),
                              elapsedMinutes
                      );
                  } catch (IllegalArgumentException ignored) {
                      return ActivityDurationStatus.NORMAL;
                  }
              }

          '''
              return replace_once(text, anchor, helper + anchor, 'snapshot helper anchor')

          rewrite(
              'src/main/java/com/laishengkai/digitalperson/experience/PersonEventSnapshot.java',
              snapshot
          )

          def prompt(text):
              text, count = re.subn(
                  r'记忆判断用餐\s+与睡眠。',
                  '记忆判断用餐与睡眠。',
                  text,
                  count=1
              )
              if count != 1:
                  raise SystemExit(f"activity prompt matches={count}")
              return text

          rewrite(
              'src/main/java/com/laishengkai/digitalperson/infrastructure/activity/LanguageModelPersonActivityDecisionModel.java',
              prompt
          )

          rewrite(
              'src/main/java/com/laishengkai/digitalperson/state/StateUpdater.java',
              lambda text: replace_once(
                  text,
                  'fatigueTarget = clampRange(0.05 + sleepDebtHours * 0.03, 0.05, 0.25);',
                  'fatigueTarget = clampRange(0.05 + sleepDebtHours * 0.0125, 0.05, 0.15);',
                  'sleep fatigue target'
              )
          )

          def merger_test(text):
              text = replace_once(
                  text,
                  'new StateTransition(StateDimension.ENERGY, 2.0)',
                  'new StateTransition(StateDimension.ENERGY, 30.0)',
                  'first merger shape'
              )
              return replace_once(
                  text,
                  'new StateTransition(StateDimension.ENERGY, 2.5)',
                  'new StateTransition(StateDimension.ENERGY, 20.0)',
                  'second merger shape'
              )

          rewrite(
              'src/test/java/com/laishengkai/digitalperson/state/StateTransitionMergerTest.java',
              merger_test
          )

          def event_service_test(text):
              init = 'Person person = new Person(PERSONALITY, stateWithHunger(0.7));'
              if text.count(init) < 3:
                  raise SystemExit('event service initial state count changed')
              text = text.replace(
                  init,
                  'Person person = new Person(PERSONALITY, stateWithValence(0.7));',
                  2
              )
              text = replace_once(
                  text,
                  'new StateTransition(StateDimension.HUNGER, -1.0)',
                  'new StateTransition(StateDimension.VALENCE, -1.0)',
                  'first valence transition'
              )
              text = replace_once(
                  text,
                  'new StateTransition(StateDimension.ENERGY, 1.0)',
                  'new StateTransition(StateDimension.TENSION, 1.0)',
                  'replacement transition'
              )
              text = replace_once(
                  text,
                  'new StateTransition(StateDimension.HUNGER, -1.0)',
                  'new StateTransition(StateDimension.VALENCE, -1.0)',
                  'second valence transition'
              )
              text, count = re.subn(
                  r'double expectedHunger = 0\.7 \* Math\.exp\(-1\.0 / 6\.0\);\s*assertEquals\(expectedHunger, result\.state\(\)\.hunger\(\), EPSILON\);',
                  '''double expectedValence = 0.7 * Math.exp(-1.0 / 6.0);
                  assertEquals(expectedValence, result.state().valence(), EPSILON);''',
                  text
              )
              if count != 2:
                  raise SystemExit(f"event service expectation matches={count}")
              anchor = '    private static PersonState stateWithHunger(double hunger) {'
              helper = '''    private static PersonState stateWithValence(double valence) {
                  return new PersonState(
                          new AffectState(valence, 0.5, 0.0),
                          CognitiveState.baseline(),
                          PhysicalState.baseline(),
                          SocialState.baseline()
                  );
              }

          '''
              return replace_once(text, anchor, helper + anchor, 'event service helper')

          rewrite(
              'src/test/java/com/laishengkai/digitalperson/application/PersonEventCommandServiceTest.java',
              event_service_test
          )

          def consistency_test(text):
              text = replace_once(
                  text,
                  'Person person = new Person(PERSONALITY, stateWithHunger(0.7));',
                  'Person person = new Person(PERSONALITY, stateWithValence(0.7));',
                  'consistency initial state'
              )
              text = replace_once(
                  text,
                  'eventBoundImpact(new StateTransition(StateDimension.HUNGER, -1.0))',
                  'eventBoundImpact(new StateTransition(StateDimension.VALENCE, -1.0))',
                  'consistency transition'
              )
              text = replace_once(
                  text,
                  'stored.getState().getPhysicalState().getHunger()',
                  'stored.getStateSnapshot().valence()',
                  'consistency state assertion'
              )
              anchor = '    private static PersonState stateWithHunger(double hunger) {'
              helper = '''    private static PersonState stateWithValence(double valence) {
                  return new PersonState(
                          new AffectState(valence, 0.5, 0.0),
                          CognitiveState.baseline(),
                          PhysicalState.baseline(),
                          SocialState.baseline()
                  );
              }

          '''
              return replace_once(text, anchor, helper + anchor, 'consistency helper')

          rewrite(
              'src/test/java/com/laishengkai/digitalperson/application/StateUpdateConsistencyRegressionTest.java',
              consistency_test
          )
          PY
          rm -f .github/workflows/apply-natural-state-ci-fixes.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix natural state regression boundaries"
          git push origin HEAD:${{ github.head_ref }}

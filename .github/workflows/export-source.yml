name: Export source

on:
  pull_request:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: source-snapshot
          path: |
            .github
            docs
            ops
            pom.xml
            src
          retention-days: 1

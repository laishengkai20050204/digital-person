name: CI

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Validate deployment scripts
        run: |
          bash -n ops/deploy-from-git.sh
          bash -n ops/ensure-mem0.sh

      - name: Verify
        run: set -o pipefail; mvn --batch-mode --no-transfer-progress verify 2>&1 | tee maven.log

      - name: Upload Maven failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maven-failure-log
          path: maven.log
          retention-days: 7

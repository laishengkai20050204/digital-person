name: CI

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Validate deployment script
        run: bash -n ops/deploy-from-git.sh

      - name: Verify
        run: |
          set -o pipefail
          mvn --batch-mode --no-transfer-progress verify 2>&1 | tee maven-verify.log

      - name: Upload Maven log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-verify-log
          path: maven-verify.log
          if-no-files-found: error

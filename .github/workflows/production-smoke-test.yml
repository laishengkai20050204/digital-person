name: Production Environment Visibility Diagnostic

on:
  push:
    branches:
      - agent/production-smoke-test
    paths:
      - .github/workflows/production-smoke-test.yml

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SMOKE_PERSON_ID: 567f1d4e-2aab-427b-a4ca-dd69a00c06df

    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/production-smoke-test

      - name: Configure SSH
        env:
          SERVER_SSH_KEY_B64: ${{ secrets.SERVER_SSH_KEY_B64 }}
          SERVER_KNOWN_HOSTS: ${{ secrets.SERVER_KNOWN_HOSTS }}
        shell: bash
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s' "$SERVER_SSH_KEY_B64" | base64 --decode > ~/.ssh/id_ed25519
          printf '%s\n' "$SERVER_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts
          ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null

      - name: Collect environment visibility diagnostics
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .smoke
          ssh \
            -i ~/.ssh/id_ed25519 \
            -p "$SERVER_PORT" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=15 \
            "$SERVER_USER@$SERVER_HOST" \
            "SMOKE_PERSON_ID='$SMOKE_PERSON_ID' bash -s" \
            > .smoke/environment-visibility-diagnostic.txt <<'REMOTE'
          set -uo pipefail

          file_status() {
            path="$1"
            printf '%s_EXISTS=%s\n' "$2" "$([ -e "$path" ] && echo YES || echo NO)"
            printf '%s_READABLE_BY_DEPLOY=%s\n' "$2" "$([ -r "$path" ] && echo YES || echo NO)"
            if [ -e "$path" ]; then
              stat -c "$2_OWNER=%U:%G%n$2_MODE=%a" "$path" 2>/dev/null || true
            fi
          }

          file_status /etc/person-ai/person-ai.env PERSON_ENV
          file_status /etc/person-ai/mem0.env MEM0_ENV

          printf 'SYSTEMD_ENVIRONMENT_FILES=%s\n' "$(systemctl show person-ai -p EnvironmentFiles --value 2>/dev/null | tr '\n' ' ' | cut -c1-400)"
          systemctl cat person-ai 2>/dev/null \
            | grep -E '^(User|Group|EnvironmentFile|ExecStart)=' \
            | sed 's/^/SYSTEMD_UNIT_/' || true

          app_url="http://127.0.0.1:8080"
          health_code="$(curl -sS --max-time 10 -o /dev/null -w '%{http_code}' "$app_url/actuator/health" 2>/dev/null || echo CURL_ERROR)"
          person_code="$(curl -sS --max-time 10 -o /dev/null -w '%{http_code}' "$app_url/api/persons/$SMOKE_PERSON_ID/state" 2>/dev/null || echo CURL_ERROR)"
          llm_code="$(curl -sS --max-time 10 -X POST -o /dev/null -w '%{http_code}' "$app_url/internal/llm/connection-test" 2>/dev/null || echo CURL_ERROR)"
          agent_code="$(curl -sS --max-time 10 -X POST -H 'Content-Type: application/json' --data '{}' -o /dev/null -w '%{http_code}' "$app_url/internal/agent/tool-loop-test" 2>/dev/null || echo CURL_ERROR)"
          printf 'ACTUATOR_HTTP=%s\n' "$health_code"
          printf 'PERSON_API_UNAUTHENTICATED_HTTP=%s\n' "$person_code"
          printf 'LLM_CONNECTION_TEST_UNAUTHENTICATED_HTTP=%s\n' "$llm_code"
          printf 'AGENT_TEST_UNAUTHENTICATED_HTTP=%s\n' "$agent_code"

          printf 'MEM0_INSTALL_DIR_EXISTS=%s\n' "$([ -d /opt/person-ai/mem0 ] && echo YES || echo NO)"
          printf 'MEM0_HEALTH_HTTP=%s\n' "$(curl -sS --max-time 5 -o /dev/null -w '%{http_code}' http://127.0.0.1:8888/auth/setup-status 2>/dev/null || echo CURL_ERROR)"
          if command -v docker >/dev/null 2>&1; then
            docker ps -a --format '{{.Names}}|{{.Status}}|{{.Image}}' 2>/dev/null \
              | grep -Ei 'mem0|qdrant|postgres|neo4j' \
              | head -20 \
              | sed 's/^/CONTAINER=/' || true
          fi

          journalctl -u person-ai -n 300 --no-pager 2>/dev/null \
            | grep -E 'Mem0 memory service|Started DigitalPerson|Tomcat started|required Mem0|memory service is unavailable' \
            | tail -20 \
            | sed -E 's/[[:space:]]+/ /g' \
            | cut -c1-300 \
            | sed 's/^/JOURNAL=/' || true
          REMOTE

      - name: Persist sanitized result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f .smoke/environment-visibility-diagnostic.txt ]; then
            mkdir -p .smoke
            printf 'RESULT_MISSING=YES\n' > .smoke/environment-visibility-diagnostic.txt
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .smoke/environment-visibility-diagnostic.txt
          git commit -m "Record environment visibility diagnostic" || true
          git push origin HEAD:agent/production-smoke-test

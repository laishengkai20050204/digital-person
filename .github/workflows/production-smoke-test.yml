name: Production Smoke Test

on:
  push:
    branches:
      - agent/production-smoke-test
    paths:
      - .github/workflows/production-smoke-test.yml

permissions:
  contents: write

jobs:
  smoke:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      EXPECTED_SHA: ed0ef5afa1e07ba1f8aa6e4243c3a1aca54e9fa6
      SMOKE_PERSON_ID: 567f1d4e-2aab-427b-a4ca-dd69a00c06df

    steps:
      - name: Check out smoke branch
        uses: actions/checkout@v4
        with:
          ref: agent/production-smoke-test

      - name: Configure SSH
        env:
          SERVER_SSH_KEY_B64: ${{ secrets.SERVER_SSH_KEY_B64 }}
          SERVER_KNOWN_HOSTS: ${{ secrets.SERVER_KNOWN_HOSTS }}
        shell: bash
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s' "$SERVER_SSH_KEY_B64" | base64 --decode > ~/.ssh/id_ed25519
          printf '%s\n' "$SERVER_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts
          ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null

      - name: Run production smoke checks
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .smoke

          ssh \
            -i ~/.ssh/id_ed25519 \
            -p "$SERVER_PORT" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=3 \
            "$SERVER_USER@$SERVER_HOST" \
            "EXPECTED_SHA='$EXPECTED_SHA' SMOKE_PERSON_ID='$SMOKE_PERSON_ID' bash -s" \
            > .smoke/production-smoke-result.txt <<'REMOTE'
          set -uo pipefail

          overall=PASS
          work_dir="$(mktemp -d /tmp/person-ai-smoke.XXXXXX)"
          trap 'rm -rf "$work_dir"' EXIT

          record() {
            key="$1"
            value="$2"
            printf '%s=%s\n' "$key" "$value"
            if [ "$value" != "PASS" ] && [ "$value" != "SKIP" ]; then
              overall=FAIL
            fi
          }

          is_true() {
            case "${1:-}" in
              1|true|TRUE|yes|YES|on|ON) return 0 ;;
              *) return 1 ;;
            esac
          }

          deployed=FAIL
          current_release=""
          for attempt in $(seq 1 60); do
            current_release="$(readlink -f /opt/person-ai/current.jar 2>/dev/null || true)"
            case "$current_release" in
              *"$EXPECTED_SHA"*) deployed=PASS; break ;;
            esac
            sleep 10
          done
          record DEPLOYED_EXPECTED_SHA "$deployed"
          printf 'CURRENT_RELEASE=%s\n' "$(basename "${current_release:-unknown}")"

          if systemctl is-active --quiet person-ai; then
            record SYSTEMD_ACTIVE PASS
          else
            record SYSTEMD_ACTIVE FAIL
          fi

          for env_file in /etc/person-ai/person-ai.env /etc/person-ai/mem0.env; do
            if [ -r "$env_file" ]; then
              set -a
              # shellcheck disable=SC1090
              source "$env_file"
              set +a
            fi
          done

          app_url="http://127.0.0.1:${SERVER_PORT:-8080}"
          if curl -fsS --max-time 10 "$app_url/actuator/health" \
              | jq -e '.status == "UP"' >/dev/null; then
            record APPLICATION_HEALTH PASS
          else
            record APPLICATION_HEALTH FAIL
          fi

          if is_true "${PERSON_API_ENABLED:-false}" && [ -n "${PERSON_API_TOKEN:-}" ]; then
            if curl -fsS --max-time 15 \
                -H "X-Internal-Token: $PERSON_API_TOKEN" \
                "$app_url/api/persons/$SMOKE_PERSON_ID/state" \
                > "$work_dir/person-state.json" \
                && jq -e --arg id "$SMOKE_PERSON_ID" \
                    '.personId == $id and (.state | type == "object")' \
                    "$work_dir/person-state.json" >/dev/null; then
              record PERSON_DATABASE_READ PASS
            else
              record PERSON_DATABASE_READ FAIL
            fi
          else
            record PERSON_DATABASE_READ SKIP
          fi

          mem0_url="${MEM0_BASE_URL:-http://127.0.0.1:8888}"
          mem0_health="${MEM0_HEALTH_PATH:-/auth/setup-status}"
          if curl -fsS --max-time 10 "${mem0_url%/}$mem0_health" >/dev/null; then
            record MEM0_HEALTH PASS
          else
            record MEM0_HEALTH FAIL
          fi

          if is_true "${MEM0_ENABLED:-false}" && [ -n "${MEM0_API_KEY:-}" ]; then
            smoke_agent="$(cat /proc/sys/kernel/random/uuid)"
            smoke_marker="PRODUCTION_SMOKE_${EXPECTED_SHA:0:8}_$(date +%s)"

            jq -n \
              --arg agent "$smoke_agent" \
              --arg marker "$smoke_marker" \
              '{messages:[{role:"user",content:$marker}],agent_id:$agent,infer:false,metadata:{source:"digital-person-smoke",section:"EPISODIC"}}' \
              > "$work_dir/mem0-add.json"

            mem0_cycle=PASS
            if ! curl -fsS --max-time 60 \
                -H "X-API-Key: $MEM0_API_KEY" \
                -H 'Content-Type: application/json' \
                --data-binary @"$work_dir/mem0-add.json" \
                "${mem0_url%/}/memories" \
                > "$work_dir/mem0-add-response.json"; then
              mem0_cycle=FAIL
            fi

            if [ "$mem0_cycle" = PASS ]; then
              jq -r '(.results // .)[]? | .id // empty' \
                "$work_dir/mem0-add-response.json" > "$work_dir/memory-ids.txt"
              if [ ! -s "$work_dir/memory-ids.txt" ]; then
                mem0_cycle=FAIL
              fi
            fi

            if [ "$mem0_cycle" = PASS ]; then
              jq -n \
                --arg agent "$smoke_agent" \
                --arg marker "$smoke_marker" \
                '{query:$marker,top_k:5,filters:{agent_id:$agent}}' \
                > "$work_dir/mem0-search.json"
              if ! curl -fsS --max-time 60 \
                  -H "X-API-Key: $MEM0_API_KEY" \
                  -H 'Content-Type: application/json' \
                  --data-binary @"$work_dir/mem0-search.json" \
                  "${mem0_url%/}/search" \
                  > "$work_dir/mem0-search-response.json" \
                  || ! jq -e --arg marker "$smoke_marker" \
                      '[((.results // .)[]? | (.memory // .text // .data // ""))] | any(contains($marker))' \
                      "$work_dir/mem0-search-response.json" >/dev/null; then
                mem0_cycle=FAIL
              fi
            fi

            if [ -s "$work_dir/memory-ids.txt" ]; then
              while IFS= read -r memory_id; do
                curl -fsS --max-time 30 \
                  -X DELETE \
                  -H "X-API-Key: $MEM0_API_KEY" \
                  "${mem0_url%/}/memories/$memory_id" >/dev/null || mem0_cycle=FAIL
              done < "$work_dir/memory-ids.txt"
            fi
            record MEM0_WRITE_SEARCH_DELETE "$mem0_cycle"
          else
            record MEM0_WRITE_SEARCH_DELETE FAIL
          fi

          llm_test=FAIL
          if is_true "${LLM_ENABLED:-false}" && [ -n "${LLM_API_KEY:-}" ] && [ -n "${LLM_MODEL:-}" ]; then
            if is_true "${LLM_CONNECTION_TEST_ENABLED:-false}" \
                && [ -n "${LLM_CONNECTION_TEST_TOKEN:-}" ]; then
              if curl -fsS --max-time 120 \
                  -X POST \
                  -H "X-Internal-Token: $LLM_CONNECTION_TEST_TOKEN" \
                  "$app_url/internal/llm/connection-test" \
                  | jq -e '.status == "UP" and .modelResponse == "CONNECTION_OK"' >/dev/null; then
                llm_test=PASS
              fi
            else
              jq -n \
                --arg model "$LLM_MODEL" \
                '{model:$model,messages:[{role:"user",content:"Reply with exactly CONNECTION_OK"}],max_tokens:16,temperature:0}' \
                > "$work_dir/llm-request.json"
              if curl -fsS --max-time 120 \
                  -H "Authorization: Bearer $LLM_API_KEY" \
                  -H 'Content-Type: application/json' \
                  --data-binary @"$work_dir/llm-request.json" \
                  "${LLM_BASE_URL%/}/chat/completions" \
                  > "$work_dir/llm-response.json" \
                  && jq -e '.choices[0].message.content | type == "string" and length > 0' \
                      "$work_dir/llm-response.json" >/dev/null; then
                llm_test=PASS
              fi
            fi
          fi
          record LLM_REAL_REQUEST "$llm_test"

          printf 'OVERALL=%s\n' "$overall"
          REMOTE

      - name: Persist sanitized result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f .smoke/production-smoke-result.txt ]; then
            mkdir -p .smoke
            printf 'OVERALL=FAIL\nRESULT_FILE_MISSING=FAIL\n' \
              > .smoke/production-smoke-result.txt
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .smoke/production-smoke-result.txt
          git commit -m "Record production smoke test result" || true
          git push origin HEAD:agent/production-smoke-test

      - name: Enforce smoke result
        if: always()
        shell: bash
        run: grep -q '^OVERALL=PASS$' .smoke/production-smoke-result.txt

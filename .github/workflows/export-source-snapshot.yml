name: Export Source Snapshot

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: source-snapshot
          path: |
            .
            !.git
          include-hidden-files: true
          retention-days: 1

name: Apply Natural State Patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply staged patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/natural-state-patch/part-* \
            | base64 --decode \
            > /tmp/natural-state-patch.tar.gz
          echo "568847389a2dc77cc8b25f22b43fb4c4d3a43c27f38b4651431e9d6967f9fc81  /tmp/natural-state-patch.tar.gz" \
            | sha256sum -c -
          tar -xzf /tmp/natural-state-patch.tar.gz
          rm -rf .github/natural-state-patch
          rm -f .github/workflows/export-source-snapshot.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Add natural state evolution"
          git push origin HEAD:${{ github.head_ref }}

name: Diagnose Natural State Patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Inspect staged payload
        shell: bash
        run: |
          set +e
          {
            echo '===== staged files ====='
            ls -l .github/natural-state-patch
            echo '===== encoded bytes ====='
            wc -c .github/natural-state-patch/part-*
            echo '===== decode ====='
            cat .github/natural-state-patch/part-* \
              | base64 --decode \
              > /tmp/natural-state-patch.tar.gz
            echo "decode_status=$?"
            echo '===== archive ====='
            ls -l /tmp/natural-state-patch.tar.gz
            sha256sum /tmp/natural-state-patch.tar.gz
            echo 'expected=568847389a2dc77cc8b25f22b43fb4c4d3a43c27f38b4651431e9d6967f9fc81'
            tar -tzf /tmp/natural-state-patch.tar.gz >/tmp/archive-list.txt
            echo "tar_status=$?"
            head -50 /tmp/archive-list.txt
          } > /tmp/natural-state-diagnostic.txt 2>&1
          cat /tmp/natural-state-diagnostic.txt
      - uses: actions/upload-artifact@v4
        with:
          name: natural-state-diagnostic
          path: /tmp/natural-state-diagnostic.txt
          retention-days: 1
